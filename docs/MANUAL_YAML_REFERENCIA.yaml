# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 6: CAMPO simbolo: — TEMPLATES DE SÍMBOLO ESQUEMÁTICO
# ─────────────────────────────────────────────────────────────────────────────
#
# O campo "simbolo:" define o visual do símbolo esquemático (.kicad_sym).
# É um campo OPCIONAL de nível raiz (tipo string). Se omitido, o sistema
# auto-detecta o template pelo "tipo:", "padrao:" e número de pinos.
#
# ─── Valores disponíveis ────────────────────────────────────────────────
#
# ╔══════════════════╦════════════════════════════════╦═══════════════════╗
# ║ simbolo:         ║ Visual no esquemático          ║ Pinos             ║
# ╠══════════════════╬════════════════════════════════╬═══════════════════╣
# ║ resistor         ║ Retângulo horizontal passivo   ║ 2                 ║
# ║ capacitor        ║ Duas placas paralelas          ║ 2                 ║
# ║ diodo            ║ Triângulo + barra catodo       ║ 2 (A/K)           ║
# ║ diodo_zener      ║ Diodo + barra Z                ║ 2 (A/K)           ║
# ║ diodo_schottky   ║ Diodo + barra S                ║ 2 (A/K)           ║
# ║ led              ║ Diodo + setas de luz           ║ 2 (A/K)           ║
# ║ transistor       ║ NPN BJT com círculo            ║ 3 (B/C/E)         ║
# ║ mosfet_n         ║ MOSFET canal N                 ║ 3 (G/D/S)         ║
# ║ mosfet_p         ║ MOSFET canal P                 ║ 3 (G/D/S)         ║
# ║ regulador        ║ Retângulo IN/GND/OUT           ║ 3                 ║
# ║ opamp            ║ Triângulo op-amp               ║ 3-5               ║
# ║ indutor          ║ Bobina (4 arcos)               ║ 2                 ║
# ║ fusivel          ║ Retângulo com fio              ║ 2                 ║
# ║ bateria          ║ Placas +/-                     ║ 2                 ║
# ║ antena           ║ V invertido                    ║ 1                 ║
# ║ crystal          ║ Cristal (barras + retângulo)   ║ 2                 ║
# ║ conector         ║ Retângulo com pinos na esquerda║ N                 ║
# ║ ci               ║ CI genérico (2 lados)          ║ N                 ║
# ║ bga              ║ CI quadrado (4 lados)          ║ N                 ║
# ╚══════════════════╩════════════════════════════════╩═══════════════════╝
#
# ─── Auto-detecção (quando simbolo: é omitido) ─────────────────────────
#
#   1 pino          → antena
#   2 pinos         → resistor (passivo genérico)
#   3 pinos         → regulador
#   4–40 pinos      → ci (CI genérico, 2 lados)
#   40+ pinos       → bga (CI quadrado, 4 lados)
#
# NOTA: A auto-detecção é baseada apenas no número de pinos.
# Para garantir o visual correto, SEMPRE especifique simbolo: para
# componentes como diodos, LEDs, transistores e MOSFETs, que de outra
# forma seriam mapeados para "resistor" (2 pinos) ou "regulador" (3 pinos).
#
# ─── Exemplos de uso ───────────────────────────────────────────────────
#
# Exemplo 1: Diodo com símbolo explícito
# nome: "1N4007_DO41"
# tipo: diodo_pth
# simbolo: diodo                 # ← garante triângulo + barra
# ...
#
# Exemplo 2: LED com símbolo explícito
# nome: "LED_5mm_Verde"
# tipo: led_pth
# simbolo: led                   # ← garante diodo + setas de luz
# ...
#
# Exemplo 3: MOSFET N-channel
# nome: "IRLZ44N_TO220"
# padrao: radial_pth
# simbolo: mosfet_n              # ← garante símbolo MOSFET canal N
# ...
#
# Exemplo 4: Auto-detectado (CI genérico)
# nome: "ATmega328P_DIP28"
# tipo: ci_dip
# # simbolo: omitido → 28 pinos → auto-detecta "ci" (2 lados) ✓
# ...


# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 7: CAMPOS DIMENSIONAIS — REFERÊNCIA RÁPIDA
# ─────────────────────────────────────────────────────────────────────────────
#
# ─── Regras dimensionais IPC-7351B ──────────────────────────────────────
#
#   Annular Ring mínimo (IPC Classe 2): 0.15mm
#     → diametro_pad ≥ diametro_furo + 0.30mm
#
#   Courtyard mínimo:
#     → SMD: 0.25mm   (componentes de montagem superficial)
#     → PTH: 0.50mm   (componentes through-hole)
#
#   Silkscreen:
#     → Largura de linha: 0.12mm (padrão KiCad)
#     → Não pode sobrepor pads
#
#   Fab layer:
#     → Largura de linha: 0.10mm
#     → Contorno real do corpo do componente
#
# ─── Unidades ────────────────────────────────────────────────────────────
#
#   TODAS as dimensões são em milímetros (mm).
#   1 mil = 0.0254mm  |  100mil = 2.54mm
#
#   Conversões comuns:
#     2.54mm  = 100mil (pitch DIP, headers)
#     1.27mm  = 50mil  (pitch SOIC)
#     0.65mm  = ~25mil (pitch SSOP, QFN, TQFP)
#     0.50mm  = ~20mil (pitch QFP fino)
#     0.40mm  = ~16mil (pitch QFN fino)
#
# ─── Coordenadas ─────────────────────────────────────────────────────────
#
#   Origem (0,0) = centro do componente
#   X positivo = direita
#   Y positivo = baixo (convenção KiCad footprint)
#   Pino 1 sempre no canto superior esquerdo ou lado esquerdo


