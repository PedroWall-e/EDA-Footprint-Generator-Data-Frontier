# kicad: {referencia: "U?", ...}
#
# Para componentes 2-pad (chip 0805, SOD-123, SMA):
# pinos:
#   total: 2
#   pitch: 0                     # Não se aplica para 2 pads
#   distribuicao: [1, 1]         # 1 pad de cada lado
#   tamanho_pad: {largura: 1.0, altura: 1.1}
# corpo:
#   afastamento_colunas: 2.0     # Centro-a-centro dos 2 pads


# ─── 4.5 quad_smd ───────────────────────────────────────────────────────────

# padrao: quad_smd
# nome: "QFN_16_4x4"
# pinos:
#   pitch: 0.65                  # OBRIGATÓRIO
#   tamanho_pad:                 # OBRIGATÓRIO
#     largura: 0.8
#     altura: 0.3
#   lados:                       # Opção A: especificar cada lado
#     esquerdo: 4
#     base: 4
#     direito: 4
