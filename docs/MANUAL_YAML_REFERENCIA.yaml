#   # OU
#   por_lado: 4                  # Opção B: mesmo número nos 4 lados
#   # OU
#   total: 16                    # Opção C: total (dividido em 4)
#   overrides:                   # Opcional: pads com tamanho diferente.
#                                # Aceita DUAS formas (ver schema: oneOf):
#     "1": {largura: 1.2, altura: 0.5}    # Forma A (dict): por número de pino
#   # OU — Forma B (lista): por grupo de pinos. Prática em castellated/QFN,
#   # onde dezenas de pinos (VCC/GND/RF) compartilham o mesmo tamanho:
#   # overrides:
#   #   - numeros: [1, 9, 16, 24]
#   #     largura: 2.5
#   #     altura: 1.2
#   #   - numeros: [25, 28]
#   #     largura: 3.0
#   #     altura: 1.4
#   # Campos largura/altura ausentes caem no default do padrão.
#   #
#   # ONDE FUNCIONA (desde a correção — antes só o quad_smd honrava, os demais
#   # ignoravam em silêncio):
#   #   axial_pth, radial_pth, dual_pth  → largura/altura viram o TAMANHO do pad.
#   #       Um pad PTH redondo é só o caso largura == altura; com valores
#   #       diferentes o pad vira OVAL (o KiCad exige isso). O anel é validado
#   #       contra o menor lado.
#   #   dual_smd, quad_smd               → tamanho do pad.
#   #       No dual_smd, `pinos_absolutos[N].pad` (mais específico) tem
#   #       precedência sobre overrides.
#   #   bga                              → endereça a BOLA pelo nome, não por
#   #       índice. Use a forma dict: overrides: {"A1": {largura: .., altura: ..}}
#   #   custom                           → NÃO usa overrides: cada pad já declara
#   #       largura/altura na própria lista `pads:`.
#   thermal_pad:                 # Opcional: pad térmico central (QFN)
#     largura: 2.5
#     altura: 2.5
#     paste_ratio: 0.5
# corpo:
#   largura: 4.0                 # Largura do corpo
#   comprimento: 4.0             # Comprimento (ou use "altura")
# # OU para castellated, use pcb:
# pcb:
#   largura: 20.0                # Dimensões da placa do módulo
#   altura: 15.0
# margens: {courtyard: 0.25, silkscreen: 0.12, fab_line: 0.10}
# kicad: {referencia: "U?", ...}


# ─── 4.6 custom ─────────────────────────────────────────────────────────────
#
# Para componentes com pads em posições totalmente arbitrárias.
# Cada pad é definido individualmente com posição, tamanho e formato.
# Cobre 100% dos componentes possíveis.

# padrao: custom
# nome: "Antena_Patch_GPS"
# pads:                          # OBRIGATÓRIO. Lista de pads
#   - numero: 1                  # Número do pad (auto-incrementa se omitido)
#     nome: "SIGNAL"             # Nome funcional (opcional)
#     tipo_eletrico: "passive"   # Tipo elétrico (opcional)
#     x: 0.0                     # Posição X em mm (0,0 = centro)
#     y: 6.0                     # Posição Y em mm
#     largura: 1.5               # Dimensão X do pad (mm)
#     altura: 1.5                # Dimensão Y do pad (mm)
#     formato: "retangulo"       # "retangulo"|"circulo"|"oval"|"roundrect"
#     montagem: "smd"            # "smd" ou "pth"
#     furo: 0.0                  # Diâmetro do furo (só para pth, 0 = smd)
#     roundrect_ratio: 0.25      # Raio das bordas (só para roundrect, 0.0-0.5)
#
#   - numero: 2
#     nome: "GND"
#     tipo_eletrico: "power_in"
#     x: -10.0
#     y: -10.0
#     largura: 2.0
#     altura: 2.0
#     formato: "retangulo"
#     montagem: "smd"
#
# corpo:
#   largura: 25.0
#   comprimento: 25.0
#   formato: retangulo           # "retangulo", "cilindro"
# margens: {courtyard: 0.50, silkscreen: 0.12, fab_line: 0.10}
# kicad: {referencia: "ANT?", ...}
#
# ─── DICA: Pads mistos (SMD + PTH no mesmo componente) ──────────────────
# O padrão "custom" aceita mistura de pads SMD e PTH.
# O atributo do footprint é determinado automaticamente:
#   - Só SMD → attr: smd
#   - Só PTH → attr: through_hole
#   - Misto  → attr: smd


