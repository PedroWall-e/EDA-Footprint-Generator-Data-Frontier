# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 4: MOTOR UNIVERSAL (padrao:) — 6 Padrões Paramétricos
# ─────────────────────────────────────────────────────────────────────────────
#
# Use "padrao:" quando precisar de mais flexibilidade ou quando o componente
# não se encaixa nos presets. O motor universal calcula posições de pads
# automaticamente baseado no padrão escolhido.
#
# ╔══════════════╦════════════════════════════════╦════════════════════════════╗
# ║ padrao:      ║ Distribuição dos Pads          ║ Componentes Cobertos       ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ axial_pth    ║ 2 pads em linha reta           ║ Resistor, Diodo, LED,     ║
# ║              ║  ●───corpo───●                 ║ Cristal, Cap axial        ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ radial_pth   ║ 3+ pads em cluster             ║ TO-92, TO-220, TO-247     ║
# ║              ║    ● ● ●                       ║                            ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ dual_pth     ║ 2 fileiras paralelas PTH       ║ DIP-8/14/16/28            ║
# ║              ║  ●      ●                      ║                            ║
# ║              ║  ●      ●                      ║                            ║
# ║              ║  ●      ●                      ║                            ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ dual_smd     ║ 2 fileiras paralelas SMD       ║ SOIC, SSOP, SOT-23,      ║
# ║              ║  ▪      ▪                      ║ 0402-1206, SOD-123, SMA   ║
# ║              ║  ▪      ▪                      ║                            ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ quad_smd     ║ 4 lados de pads SMD            ║ QFP, QFN, TQFP,          ║
# ║              ║    ▪ ▪ ▪                       ║ Castellated               ║
# ║              ║  ▪       ▪                     ║                            ║
# ║              ║    ▪ ▪ ▪                       ║                            ║
# ╠══════════════╬════════════════════════════════╬════════════════════════════╣
# ║ custom       ║ Pads em posição arbitrária     ║ Antena, Bateria,          ║
# ║              ║  ▪     ●                       ║ Supercapacitor, Módulo RF,║
# ║              ║       ▪                        ║ Qualquer componente       ║
# ╚══════════════╩════════════════════════════════╩════════════════════════════╝


