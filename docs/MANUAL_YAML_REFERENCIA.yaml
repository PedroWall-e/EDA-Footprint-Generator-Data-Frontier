# ═══════════════════════════════════════════════════════════════════════════════
# MANUAL DE REFERÊNCIA YAML — EDA Footprint Generator
# ═══════════════════════════════════════════════════════════════════════════════
#
# Este documento serve como:
#   1. Manual descritivo para HUMANOS (engenheiros de PCB, desenvolvedores)
#   2. Prompt completo para AGENTES DE IA (LLMs, copilots, geradores automáticos)
#
# Versão: 2.0
# Última atualização: 2026-06-15
# ═══════════════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 1: VISÃO GERAL DO SISTEMA
# ─────────────────────────────────────────────────────────────────────────────
#
# A EDA Footprint Generator gera automaticamente, a partir de um 
# único arquivo YAML, os seguintes artefatos para o KiCad:
#
#   1. Footprint 2D (.kicad_mod) — pads, silkscreen, courtyard, fab layer
#   2. Símbolo esquemático (.kicad_sym) — pinos, corpo, propriedades
#   3. Modelo 3D (.step) — corpo sólido via CadQuery
#   4. Biblioteca (.kicad_sym + .pretty/) — exportação batch
#
# O sistema possui DOIS motores de geração de footprint:
#
#   A) MOTOR PRESET (tipo:) — 10 tipos pré-programados, rápido e direto
#   B) MOTOR UNIVERSAL (padrao:) — 6 padrões paramétricos, flexível
#
# Se o YAML contiver o campo "padrao:", usa o Motor Universal.
# Se contiver "tipo:", usa o Motor Preset.
# Se contiver ambos, "padrao:" tem prioridade.
#
#
# ─── Fluxo de decisão ───
#
#   ┌─────────────────────┐
#   │  Novo componente?    │
#   └────────┬────────────┘
#            │
#   ┌────────▼────────────┐     SIM     ┌──────────────────────┐
#   │ Existe preset YAML? │────────────►│ Duplicar preset,     │
#   │ (_preset_*.yaml)    │             │ alterar nome/valores  │
#   └────────┬────────────┘             └──────────────────────┘
#            │ NÃO
#   ┌────────▼────────────┐     SIM     ┌──────────────────────┐
#   │ Encaixe de padrão?  │────────────►│ Usar padrao: + dados │
#   │ (axial/dual/quad)   │             │ paramétricos          │
#   └────────┬────────────┘             └──────────────────────┘
#            │ NÃO
#   ┌────────▼────────────┐             ┌──────────────────────┐
#   │ Formato exótico?    │────────────►│ Usar padrao: custom  │
#   │ (antena, bateria)   │             │ + pads individuais   │
#   └─────────────────────┘             └──────────────────────┘
#


# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 2: ESTRUTURA BÁSICA DO YAML
# ─────────────────────────────────────────────────────────────────────────────
#
# Todo YAML de componente segue esta estrutura:

# ─── Campos obrigatórios (TODOS os componentes) ─────────────────────────────

nome: "NomeSemEspacos"          # OBRIGATÓRIO. Nome único do componente.
                                 # Sem espaços — use _ ou CamelCase.
                                 # Ex: "NE555_DIP8", "Resistor_470R"

# ─── Escolha UM dos dois campos abaixo ──────────────────────────────────────

tipo: "ci_dip"                   # Motor Preset — escolher entre 10 tipos
# OU
padrao: "dual_pth"               # Motor Universal — escolher entre 6 padrões

# ─── Campos opcionais de identificação ──────────────────────────────────────

fabricante: "Texas Instruments"  # Nome do fabricante
mpn: "NE555P"                    # Código do fabricante (Manufacturer Part Number)
datasheet_url: "https://..."     # URL do datasheet
# simbolo: "ci"                  # Template de símbolo esquemático (ver SEÇÃO 6)
#                                # Se omitido, auto-detecta pelo tipo/padrao e nº de pinos

# ─── Seção kicad (obrigatória) ──────────────────────────────────────────────

kicad:
  referencia: "U?"               # Prefixo de referência no esquemático
                                 # R? = Resistor   D? = Diodo/LED    U? = CI
                                 # Q? = Transistor  C? = Capacitor   Y? = Cristal
                                 # J? = Conector   ANT? = Antena     BT? = Bateria
                                 # L? = Indutor    F? = Fusível
  valor: "NE555"                 # Texto mostrado no esquemático
  descricao: "Timer NE555 DIP-8" # Descrição para a biblioteca
  tags: "timer 555 dip pth"      # Tags para busca (separadas por espaço)
  modelo_3d: "NE555_DIP8.step"   # OPCIONAL. Arquivo 3D que o footprint referencia.
                                 #   omitido    -> usa "<nome>.step", que é
                                 #                 exatamente o que o cli.py gera
                                 #   ""         -> não referencia 3D nenhum
                                 #   com / ou $ -> tratado como caminho completo
                                 #
                                 # BIBLIOTECA COMPARTILHADA: o prefixo padrão
                                 # ${KIPRJMOD}/ aponta para a pasta do PROJETO e
                                 # não serve — o .step não mora junto do
                                 # .kicad_pro. Use uma variável do KiCad
                                 # (Preferences -> Configure Paths):
                                 #   modelo_3d: "${MINHA_LIB_3DSHAPES}/Peca.step"
                                 # ou defina kicad.modelo_3d_path como prefixo.
  footprint_lib: "DataFrontier:NE555_DIP8"  # Referência da biblioteca (opcional)

# ─── Seção margens (com padrões sensatos) ───────────────────────────────────

margens:
  courtyard: 0.50                # Margem de courtyard em mm (IPC-7351: 0.25-0.50)
                                 # SMD: usar 0.25  |  PTH: usar 0.50
  silkscreen: 0.12               # Largura de linha do silkscreen (F.SilkS)
  fab_line: 0.10                 # Largura de linha da camada fabricação (F.Fab)

# ─── Seção elétrica (opcional, metadados) ───────────────────────────────────

eletrico:
  tolerancia: "5%"               # Tolerância (resistor/capacitor)
  potencia: "0.25W"              # Potência máxima
  tensao_maxima: "50V"           # Tensão máxima
  polaridade: true               # true = polarizado, false = não polarizado

# ─── Seção de nomes e tipos de pinos (opcional, melhora o símbolo) ──────────

pin_names:
  "1": "GND"                     # Mapeia número do pino → nome funcional
  "2": "TRIG"
  "3": "OUT"

pin_types:
  "1": "power_in"                # Mapeia número do pino → tipo elétrico
  "2": "input"
  "3": "output"

# ─── Tipos elétricos válidos para pin_types ─────────────────────────────────
#
#   input          → Entrada digital/analógica
#   output         → Saída push-pull
#   bidirectional  → Bidirecional (ex: I2C SDA, barramento de dados)
#   power_in       → Alimentação de entrada (VCC, GND)
#   power_out      → Alimentação de saída (regulador)
#   passive        → Passivo (resistor, capacitor, cristal, antena)
#   open_collector → Saída coletor/dreno aberto
#   tri_state      → Saída tri-state
#   unspecified    → Não especificado
#
# Se pin_types não for fornecido:
#   - Componentes passivos (resistor, diodo, cap, cristal, LED): "passive"
#   - CIs (ci_dip, ci_soic, castellated): "bidirectional"


# ─────────────────────────────────────────────────────────────────────────────
# SEÇÃO 3: MOTOR PRESET (tipo:) — 10 Tipos Pré-Programados
# ─────────────────────────────────────────────────────────────────────────────
#
# Use "tipo:" quando o componente se encaixa perfeitamente em um dos 10
# formatos abaixo. É mais rápido e requer menos campos no YAML.
#
# ╔══════════════════╦════════════════════════════╦══════════════╗
# ║ tipo:            ║ Uso                        ║ Referência   ║
# ╠══════════════════╬════════════════════════════╬══════════════╣
# ║ resistor_pth     ║ Resistor axial THT         ║ R?           ║
# ║ diodo_pth        ║ Diodo axial (DO-35/DO-41)  ║ D?           ║
# ║ led_pth          ║ LED THT 5mm                ║ D?           ║
# ║ capacitor_pth    ║ Capacitor eletrolítico     ║ C?           ║
# ║ transistor_to92  ║ Transistor TO-92           ║ Q?           ║
# ║ crystal_hc49     ║ Cristal HC-49              ║ Y?           ║
# ║ conector_pth     ║ Pin header 1 fileira       ║ J?           ║
# ║ ci_dip           ║ CI DIP through-hole        ║ U?           ║
# ║ ci_soic          ║ CI SOIC SMD                ║ U?           ║
# ║ castellated      ║ Módulo castellated 4 lados ║ U?           ║
# ╚══════════════════╩════════════════════════════╩══════════════╝


