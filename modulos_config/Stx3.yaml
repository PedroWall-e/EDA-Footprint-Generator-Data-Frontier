# =============================================================================
# Globalstar STX3 — transmissor satelital simplex, 32 pinos castelados
# Modulo 20,574 x 28,702 x 4,115 mm (0.810 x 1.130 x 0.162 pol)
#
# Datasheet: STX3 User Manual 8545-0198-01 R-4.
# As 32 posicoes sao DERIVADAS das cotas da Fig.7 — nenhuma medida na
# figura. Ver missoes/stx3/derivar_stx3.py para a derivacao e o datum.
#
# padrao: custom porque a fileira INFERIOR tem pitch NAO-UNIFORME
#   .055 | .100 | .100 | .100 | .120 | .120 | .100 | .055
# Os .120 cercam o pino 14 (RFOUT) — folga extra para o RF. O quad_smd
# aplica um pitch so', entao nao expressa esta peca.
#
# Pads sao ORIENTADOS: o lado longo (.080) entra perpendicular a borda que
# o pad ocupa; o curto (.076) corre ao longo dela. Colunas -> (.080, .076);
# fileiras -> (.076, .080). Trocar isso poe pads em curto.
# =============================================================================

nome: "Globalstar_STX3"
padrao: custom
fabricante: "Globalstar"
mpn: "~"  # Confidencial
datasheet_url: "~"  # STX3 User Manual 8545-0198-01 R-4

corpo:
  largura: 20.574      # Fig.1: 0.810 pol
  comprimento: 28.702  # Fig.1: 1.130 pol
  altura_3d: 4.115   # Fig.1: 0.162 pol
  formato: retangulo

margens:
  courtyard: 0.5
  silkscreen: 0.12
  fab_line: 0.10

kicad:
  referencia: "U?"
  valor: "STX3"
  descricao: "Globalstar STX3 simplex satellite transmitter, 32 castellated pads, 20.57x28.70x4.12mm"
  tags: "globalstar stx3 satellite simplex transmitter module castellated"

