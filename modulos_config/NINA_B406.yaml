# =============================================================================
# u-blox NINA-B406-00B — LGA-71 (15,00 x 10,00 x 2,23 mm)
# Bluetooth LE com antena de trilha integrada no modulo.
#
# Datasheet: UBX-19049405 R09 — Table 22 (Land pattern dimensions).
# Cada bloco abaixo espelha UMA linha da Table 22: as cotas entram como os
# proprios numeros do datasheet (H, F, R, M, N, Q, S, T, U, K, L, P, ZA1,
# ZA2, ZB), nao como coordenadas ja calculadas.
#
# origem: pino_1 -> as posicoes sao relativas ao PINO 1, como o datasheet
# cota. `da_borda` traz D e E (borda -> centro do pino 1); o gerador faz a
# conversao para o centro do corpo.
#
# Y segue a convencao do KiCad (cresce para BAIXO). O datasheet cota para
# cima, entao os dy aparecem negados aqui.
#
# Pads sao ORIENTADOS: J (1,15 = "pin length") entra PERPENDICULAR a borda;
# I (0,70 = "pin width") corre AO LONGO dela. Fileira em X -> (I, J);
# fileira em Y -> (J, I). Trocar isso poe os pads laterais em curto.
# =============================================================================

nome: "NINA_B406"
padrao: custom

origem:
  referencia: pino_1
  da_borda: {esquerda: 1.8, base: 0.875}   # Table 22 D e E

corpo:
  largura: 15          # Table 22 A
  comprimento: 10      # Table 22 B
  formato: retangulo

margens:
  courtyard: 0.25
  silkscreen: 0.12
  fab_line: 0.10

kicad:
  referencia: "U?"
  valor: "NINA-B406"
  descricao: "u-blox NINA-B406 Bluetooth LE module, LGA-71, 15x10x2.23mm, integrated antenna"
  tags: "u-blox nina b406 bluetooth ble lga71 module antenna"

grupos_pads:
  # --- lateral_inferior  (pino 1 na origem; pitch H; pad I x J)
  - nome: lateral_inferior
    numero_inicial: 1
    n: 10
    inicio: {x: 0, y: -0}
    passo:  {x: 1, y: -0}
    tamanho: {largura: 0.7, altura: 1.15}
    nomes: ["GPIO_1", "XL1/GPIO_2", "XL2/GPIO_3", "GPIO_4", "GPIO_5", "GND", "GPIO_7", "SWO/TRACE_D0/GPIO_8", "VCC_IO", "VCC"]

  # --- fileira_antena  (dx=R; de F, pitch H)
  - nome: fileira_antena
    numero_inicial: 11
    n: 5
    inicio: {x: 8.925, y: -2.125}
    passo:  {x: 0, y: -1}
    tamanho: {largura: 1.15, altura: 0.7}
    nomes: ["SWDCLK", "GND", "ANT", "GND", "SWDIO"]

  # --- lateral_superior  (dy=B-2E; pitch H, dx decrescente)
  - nome: lateral_superior
    numero_inicial: 16
    n: 10
    inicio: {x: 9, y: -8.25}
    passo:  {x: -1, y: -0}
    tamanho: {largura: 0.7, altura: 1.15}
    tipo_eletrico: bidirectional
    nomes: ["GPIO_16", "GPIO_17", "GPIO_18", "RESET_N", "GPIO_20", "GPIO_21", "GPIO_22", "GPIO_23", "GPIO_24", "GPIO_25"]

  # --- coluna_esquerda  (dx=Y; de F+4H, pitch -H)
  - nome: coluna_esquerda
    numero_inicial: 26
    n: 5
    inicio: {x: 0.075, y: -6.125}
    passo:  {x: 0, y: 1}
    tamanho: {largura: 1.15, altura: 0.7}
    nomes: ["GND", "GPIO_27", "NFC1/GPIO_28", "NFC2/GPIO_29", "GND"]

  # --- interna_inferior  (dy=N; de M, pitch Q; pad O)
  - nome: interna_inferior
    numero_inicial: 31
    n: 6
    inicio: {x: 1.45, y: -1.375}
    passo:  {x: 1.1, y: -0}
    tamanho: {largura: 0.7, altura: 0.7}
    nomes: ["VBUS", "TRACE_D2/GPIO_32", "TRACE_D3/GPIO_33", "GPIO_34", "GPIO_35", "GPIO_36"]

  # --- interna_superior  (dy=(B-2E)-N; pitch Q)
  - nome: interna_superior
    numero_inicial: 37
    n: 6
    inicio: {x: 6.95, y: -6.875}
    passo:  {x: -1.1, y: -0}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: bidirectional
    nomes: ["GPIO_37", "GPIO_38", "GPIO_39", "GPIO_40", "GPIO_41", "GPIO_42"]

  # --- interna_coluna_esq  (dx=M; de N+4Q, pitch -Q)
  - nome: interna_coluna_esq
    numero_inicial: 43
    n: 4
    inicio: {x: 1.45, y: -5.775}
    passo:  {x: 0, y: 1.1}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: bidirectional
    nomes: ["GPIO_43", "GPIO_44", "TRACE_CLK/GPIO_45", "TRACE_D1/GPIO_46"]

  # --- externa  (dx=-U; de T+8S, pitch -S)
  - nome: externa
    numero_inicial: 47
    n: 9
    inicio: {x: -1.15, y: -8.125}
    passo:  {x: 0, y: 1}
    tamanho: {largura: 0.7, altura: 0.7}
    nomes: ["GPIO_47", "GPIO_48", "GPIO_49", "GPIO_50", "GPIO_51", "GPIO_52", "GND", "USB_DP", "USB_DM"]

  # --- central_col1  (dx=K-3P; de L+P, pitch P)
  - nome: central_col1
    numero_inicial: 56
    n: 2
    inicio: {x: 2.775, y: -3.55}
    passo:  {x: 0, y: -1.15}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND"]

  # --- central_col2  (dx=K-2P; de L, pitch P)
  - nome: central_col2
    numero_inicial: 58
    n: 4
    inicio: {x: 3.925, y: -2.4}
    passo:  {x: 0, y: -1.15}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND", "GND", "GND"]

  # --- central_col3  (dx=K-P; de L+P, pitch P)
  - nome: central_col3
    numero_inicial: 62
    n: 2
    inicio: {x: 5.075, y: -3.55}
    passo:  {x: 0, y: -1.15}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND"]

  # --- central_col4  (dx=K; de L, pitch P)
  - nome: central_col4
    numero_inicial: 64
    n: 4
    inicio: {x: 6.225, y: -2.4}
    passo:  {x: 0, y: -1.15}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND", "GND", "GND"]

  # --- gnd_antena_inferior  (dx=ZA1->ZA2; dy=-ZB)
  - nome: gnd_antena_inferior
    numero_inicial: 68
    n: 2
    inicio: {x: 10, y: 0.225}
    passo:  {x: 2.55, y: -0}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND"]

  # --- gnd_antena_superior  (dx=ZA2->ZA1; dy=(B-2E)+ZB)
  - nome: gnd_antena_superior
    numero_inicial: 70
    n: 2
    inicio: {x: 12.55, y: -8.475}
    passo:  {x: -2.55, y: -0}
    tamanho: {largura: 0.7, altura: 0.7}
    tipo_eletrico: power_in
    nomes: ["GND", "GND"]
